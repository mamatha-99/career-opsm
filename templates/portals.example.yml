# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).
title_filter:
  positive:
    # -- Core roles (PRIMARY TARGET) --
    - "Software Engineer"
    - "Backend Engineer"
    - "Back End Engineer"
    - "Java Developer"
    - "Java Engineer"

    # -- AI + Backend hybrid (YOUR EDGE) --
    - "AI Backend"
    - "AI Engineer"
    - "GenAI"
    - "Generative AI"
    - "LLM"
    - "RAG"

    # -- Systems / APIs (your strength) --
    - "Microservices"
    - "Distributed Systems"
    - "API Engineer"

  negative:
    # -- seniority filter --
    - "Intern"
    - "Junior"

    # -- irrelevant stacks --
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Frontend"
    - "React Native"

    # -- unrelated domains --
    - "Blockchain"
    - "Web3"
    - "Crypto"

    # -- legacy / mismatch --
    - "Mainframe"
    - "COBOL"
    - "SAP "

  seniority_boost:
    - "Senior"
    - "Lead"
    - "Staff"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.
search_queries:

  # =========================
  # 🔹 JAVA / BACKEND CORE
  # =========================

  - name: Ashby — Java Backend
    query: 'site:jobs.ashbyhq.com ("Java Backend Engineer" OR "Java Developer" OR "Backend Engineer") Spring Boot microservices'
    enabled: true

  - name: Greenhouse — Backend Java
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Backend Engineer" Java Spring Boot microservices'
    enabled: true

  - name: Lever — Java Backend
    query: 'site:jobs.lever.co "Java" "Backend Engineer" OR "Software Engineer" Spring Boot'
    enabled: true


  # =========================
  # 🔹 SOFTWARE ENGINEER (BACKEND HEAVY)
  # =========================

  - name: Software Engineer Backend
    query: '"Software Engineer" backend Java Spring Boot microservices remote'
    enabled: true

  - name: Backend Engineer Remote
    query: '"Backend Engineer" Java API microservices AWS remote'
    enabled: true


  # =========================
  # 🔹 AI + BACKEND (YOUR EDGE)
  # =========================

  - name: AI Backend Engineer
    query: '"Backend Engineer" ("AI" OR "LLM" OR "RAG" OR "GenAI") Java OR Python'
    enabled: true

  - name: Java + GenAI
    query: '"Java" ("Generative AI" OR "LLM" OR "RAG") engineer'
    enabled: true

  - name: AI Software Engineer
    query: '"Software Engineer" ("AI" OR "LLM" OR "Generative AI") backend'
    enabled: true


  # =========================
  # 🔹 KAFKA / DISTRIBUTED SYSTEMS (STRONG MATCH)
  # =========================

  - name: Kafka Backend Engineer
    query: '"Kafka" "Backend Engineer" Java microservices'
    enabled: true

  - name: Distributed Systems Engineer
    query: '"Distributed Systems" "Backend Engineer" Java OR microservices'
    enabled: true


  # =========================
  # 🔹 CLOUD + PLATFORM (YOUR AWS/K8S SKILLS)
  # =========================

  - name: Backend AWS Engineer
    query: '"Backend Engineer" AWS Java microservices Docker Kubernetes'
    enabled: true

  - name: Platform Backend Engineer
    query: '"Platform Engineer" backend Java OR microservices AWS'
    enabled: true


  # =========================
  # 🔹 REMOVE NOISE (REPLACED SECTIONS)
  # =========================

  # ❌ Removed:
  # - AI Product Manager
  # - No-code / Airtable / GTM
  # - Voice-only niche roles
  # - Heavy Solutions Architect bias
